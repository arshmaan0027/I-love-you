<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You ❤️</title>
    <style>
        /* --- CSS Styles --- */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        :root {
            --bg-color: #ffeff3;
            --primary-pink: #ff8fa3;
            --soft-pink: #fff0f5;
            --text-color: #5d4037;
            --heart-color: #ff4d6d;
            --x-color: #8d99ae;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#ffccd5 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 143, 163, 0.3);
            max-width: 400px;
            width: 90%;
            position: relative;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--heart-color);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 200px;
        }

        .btn-yes {
            background-color: var(--heart-color);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        .btn-yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.6);
        }

        .btn-no {
            background-color: var(--x-color);
            color: white;
            position: relative; /* Default position */
        }

        /* Game Screen Styles */
        #game-screen {
            display: none;
        }

        .game-status {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
            min-height: 1.5em;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cell {
            width: 80px;
            height: 80px;
            background-color: var(--soft-pink);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cell:hover {
            background-color: #ffe0e6;
        }

        .cell.taken {
            cursor: default;
        }

        .cell.heart {
            color: var(--heart-color);
        }

        .cell.x {
            color: var(--x-color);
        }

        .restart-btn {
            background-color: var(--primary-pink);
            color: white;
            margin-top: 10px;
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 999;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .cell { width: 60px; height: 60px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container" id="intro-screen">
        <h1>I love you ❤️</h1>
        <p>Will you be my Valentine?</p>
        
        <div class="btn-group">
            <button class="btn-yes" onclick="startGame()">I love you too</button>
            <button class="btn-no" id="runaway-btn" onmouseover="moveButton()">I don't love you</button>
        </div>
    </div>

    <div class="container" id="game-screen">
        <h1>Tic Tac Toe ❤️</h1>
        <div class="game-status" id="status">Your Turn (♥)</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="restart-btn" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        /* --- JavaScript Logic --- */

        // --- Intro Screen Logic ---
        
        function startGame() {
            // Show Alert
            // Using a small timeout to let the button animation play slightly before alert freezes it
            setTimeout(() => {
                alert("Aww 😍");
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                initGame();
            }, 100);
        }

        function moveButton() {
            const btn = document.getElementById('runaway-btn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            
            // We move the button using fixed positioning relative to the viewport
            // to ensure it jumps out of the container
            btn.style.position = 'fixed';
            btn.style.left = `${x}px`;
            btn.style.top = `${y}px`;
            btn.style.transform = 'scale(0.9)'; // Shrink slightly to look like it moved
            
            // Reset transform after a moment
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 200);
        }

        // --- Game Logic ---

        let boardState = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        const PLAYER = '♥';
        const BOT = 'X';
        
        const statusDisplay = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function initGame() {
            boardState = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            statusDisplay.textContent = `Your Turn (${PLAYER})`;
            statusDisplay.style.color = "var(--text-color)";
            
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('taken', 'heart', 'x');
            });
        }

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (boardState[clickedCellIndex] !== '' || !gameActive) {
                return;
            }

            // Player Move
            updateCell(clickedCell, clickedCellIndex, PLAYER);
            
            if (checkResult(PLAYER)) return;

            // Bot Move (with slight delay for realism)
            if (gameActive) {
                statusDisplay.textContent = "Bot is thinking...";
                setTimeout(botMove, 500);
            }
        }

        function updateCell(cell, index, player) {
            boardState[index] = player;
            cell.textContent = player;
            cell.classList.add('taken');
            if(player === PLAYER) cell.classList.add('heart');
            else cell.classList.add('x');
        }

        function botMove() {
            if (!gameActive) return;

            const availableIndices = boardState.map((val, idx) => val === '' ? idx : null).filter(val => val !== null);

                const botCellIndex = availableIndices[randomIndex];
